<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — PharmaCare</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
body { min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a5f,#0e7490);font-family:'DM Sans',sans-serif; }
.card { width:460px;border-radius:20px;padding:40px;box-shadow:0 25px 60px rgba(0,0,0,.3);border:none; }
.brand h1 { font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;color:#0f172a; }
.brand h1 span { color:#0891b2; }
.form-label { font-weight:600;font-size:.78rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px; }
.form-control,.form-select { border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:.875rem; }
.form-control:focus,.form-select:focus { border-color:#0891b2;box-shadow:0 0 0 3px rgba(8,145,178,.12); }
.btn-register { width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#0891b2);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem; }
</style>
</head>
<body>
<div class="card">
  <div class="brand text-center mb-4">
    <h1><i class="fas fa-pills me-2"></i>Pharma<span>Care</span></h1>
    <p class="text-muted" style="font-size:.85rem">Create your account</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="alert alert-{{cat}} border-0 rounded-3">{{msg}}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required placeholder="John Doe">
      </div>
      <div class="col-6">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required placeholder="johndoe">
      </div>
      <div class="col-6">
        <label class="form-label">Role</label>
        <select name="role" class="form-select">
          <option value="staff">Staff</option>
          <option value="pharmacist">Pharmacist</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="john@example.com">
      </div>
      <div class="col-12">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Min 6 characters">
      </div>
      <div class="col-12 mt-2">
        <button type="submit" class="btn-register"><i class="fas fa-user-plus me-2"></i>Register</button>
      </div>
    </div>
  </form>
  <div class="text-center mt-3">
    <a href="{{ url_for('login') }}" style="color:#0891b2;font-size:.85rem;font-weight:600;text-decoration:none">
      <i class="fas fa-arrow-left me-1"></i> Back to Login
    </a>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
