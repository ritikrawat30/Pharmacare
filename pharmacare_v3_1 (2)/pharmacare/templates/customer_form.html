{% extends 'base.html' %}
{% block title %}{{ action }} Customer{% endblock %}
{% block page_title %}{{ action }} Customer{% endblock %}
{% block content %}
<div class="page-header">
  <div><h2>{{ action }} Customer</h2></div>
  <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back</a>
</div>
<div class="card">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" name="name" class="form-control" required value="{{ customer.name if customer else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ customer.email if customer else '' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="">-- Select --</option>
            {% for g in ['Male','Female','Other'] %}
            <option value="{{ g }}" {{ 'selected' if customer and customer.gender==g }}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="date_of_birth" class="form-control" value="{{ customer.date_of_birth if customer else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" rows="2">{{ customer.address if customer else '' }}</textarea>
        </div>
        <div class="col-12 d-flex gap-3">
          <button type="submit" class="btn btn-primary px-5"><i class="fas fa-save me-2"></i>{{ action }}</button>
          <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
